apiVersion: apps/v1
kind: Deployment
metadata:
  name: password-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: password-backend
  template:
    metadata:
      labels:
        app: password-backend
    spec:
      containers:
        - name: backend
          image: password-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: password-manager-secret