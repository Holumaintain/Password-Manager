apiVersion: apps/v1
kind: Deployment
metadata:
  name: password-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: password-frontend
  template:
    metadata:
      labels:
        app: password-frontend
    spec:
      containers:
        - name: frontend
          image: password-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4173