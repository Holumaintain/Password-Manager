services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: password_manager_frontend
    ports:
      - "3000:4173"
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: password_manager_backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

networks:
  default:
    driver: bridge